  bgGrid:    "#f4f1e8",
  bgSection: "#f0ece2",
  bgInvert:  "#0a1f33",
  ink:       "#0a1f33",
  inkSoft:   "#2c3e50",
  subdued:   "#64748b",
  muted:     "#94a3b8",
  rule:      "#e2dfd6",
  ruleStrong:"#cdc7b8",
  amber:     "#b45309",
  amberSoft: "#fef3c7",
  amberDeep: "#92400e",
  teal:      "#0f766e",
  red:       "#b91c1c",
  redDeep:   "#7f1d1d",
  redSoft:   "#fee2e2",
  green:     "#15803d",
};

// ─── QUADRANT MODEL: Strategic Alignment × Impact ────────────────────
const QUAD = {
  "Core Bets": {
    code: "CB",
    color: T.ink,
    label: "Core Bets",
    desc: "High alignment · high impact.",
    counsel: "Resource generously and protect from drift.",
  },
  "Steady State": {
    code: "SS",
    color: T.teal,
    label: "Steady State",
    desc: "Aligned · lower impact.",
    counsel: "Keep moving. Don't let these crowd out Core Bets.",
  },
  "Question Marks": {
    code: "QM",
    color: T.red,
    label: "Question Marks",
    desc: "High impact · off-strategy.",
    counsel: "Either re-articulate the strategy or stop the work.",
  },
  "Reconsider": {
    code: "RC",
    color: T.muted,
    label: "Reconsider",
    desc: "Low alignment · low impact.",
    counsel: "Stop, defer, or radically descope.",
  },
};

const SA_THRESHOLD = 3;
const IMPACT_THRESHOLD = 3;

function classifyQuadrant(d) {
  const hiSA = d.sa >= SA_THRESHOLD;
  const hiI  = d.impact >= IMPACT_THRESHOLD;
  if (hiSA && hiI)  return "Core Bets";
  if (hiSA && !hiI) return "Steady State";
  if (!hiSA && hiI) return "Question Marks";
  return "Reconsider";
}
DATA.forEach((d) => (d.quadrant = classifyQuadrant(d)));

function dateToFloat(s) {
  if (!s) return null;
  const parts = s.split("-");
  return parseInt(parts[0], 10) + ((parts.length > 1 ? parseInt(parts[1], 10) : 1) - 1) / 12;
}
const TODAY = 2026 + 3 / 12;

// ─── HOT SPOTS ───────────────────────────────────────────────────────
function computeHotSpots(data) {
  const total = data.length;
  const core       = data.filter((d) => d.quadrant === "Core Bets");
  const qmarks     = data.filter((d) => d.quadrant === "Question Marks");
  const reconsider = data.filter((d) => d.quadrant === "Reconsider");
  const pmGaps     = data.filter((d) => d.pm_missing);
  const external   = data.filter((d) => d.external);
  const longRun    = data.filter((d) => d.duration_months && d.duration_months >= 18);

  const leadCounts = {};
  core.forEach((d) => { leadCounts[d.lead] = (leadCounts[d.lead] || 0) + 1; });
  const leadRanked = Object.entries(leadCounts).sort((a, b) => b[1] - a[1]);

  return [
    {
      code: "01",
      title: "Concentration of Core Bets",
      stat: core.length,
      unit: `of ${total} initiatives`,
      severity: "medium",
      body: `${Math.round((core.length / total) * 100)}% of the portfolio sits in the high-alignment, high-impact quadrant. The question for leadership: are these properly sequenced and resourced, or competing for the same scarce capacity?`,
    },
    {
      code: "02",
      title: "Question Marks worth questioning",
      stat: qmarks.length,
      unit: "high-impact · off-strategy",
      severity: "high",
      body: `${qmarks.length} initiative${qmarks.length === 1 ? "" : "s"} ${qmarks.length === 1 ? "is delivering" : "are delivering"} high impact without clear strategic alignment. Either the strategy is incomplete and needs to be re-articulated to include them, or the work is off-mission and should stop. Ambiguity here costs more than either decision.`,
    },
    {
      code: "03",
      title: "Ownership voids in flight",
      stat: pmGaps.length,
      unit: "without firm PM",
      severity: pmGaps.length > 10 ? "high" : "medium",
      body: `${pmGaps.length} initiatives carry TBC, TBD, or empty PM fields. Initiatives without named accountability slip silently — assign owners or pause within the next planning cycle.`,
    },
    {
      code: "04",
      title: "External dependency cluster",
      stat: external.length,
      unit: "need external resourcing",
      severity: "medium",
      body: `${external.length} initiatives explicitly require external support. Treat as a single procurement and capacity question — not as ${external.length} separate ones — to surface contention early.`,
    },
    {
      code: "05",
      title: "Drag from the Reconsider quadrant",
      stat: reconsider.length,
      unit: "candidates to stop or descope",
      severity: "medium",
      body: `${reconsider.length} initiatives sit low on both alignment and impact. Halving this list frees meaningful capacity for Core Bets without shrinking ambition.`,
    },
    {
      code: "06",
      title: leadRanked[0] ? `${leadRanked[0][0]} carries the most Core Bets` : "Lead workload",
      stat: leadRanked[0] ? leadRanked[0][1] : 0,
      unit: "Core Bets owned",
      severity: "low",
      body: leadRanked[0]
        ? `${leadRanked[0][0]} owns ${leadRanked[0][1]} Core Bet${leadRanked[0][1] === 1 ? "" : "s"}${leadRanked[1] ? `, followed by ${leadRanked[1][0]} (${leadRanked[1][1]})` : ""}. Validate that lead-level capacity matches the implied commitment.`
        : "",
    },
  ];
}

// ─── 2x2 MATRIX ──────────────────────────────────────────────────────
function Matrix({ data, onSelect, hovered, setHovered, filterQuadrant }) {
  const W = 800, H = 560;
  const PAD = { l: 80, r: 40, t: 60, b: 70 };
  const innerW = W - PAD.l - PAD.r, innerH = H - PAD.t - PAD.b;
  // Both axes: 1 (low) to 5 (high)
  const xS = (v) => PAD.l + ((v - 1) / 4) * innerW;
  const yS = (v) => PAD.t + (1 - (v - 1) / 4) * innerH;
  const xMid = xS(SA_THRESHOLD), yMid = yS(IMPACT_THRESHOLD);
  const filtered = filterQuadrant ? data.filter((d) => d.quadrant === filterQuadrant) : data;

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block", fontFamily: "var(--f-sans)" }}>
      <defs>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
          <path d="M 40 0 L 0 0 0 40" fill="none" stroke={T.rule} strokeWidth="0.5" opacity="0.6" />
        </pattern>
      </defs>
      <rect x={PAD.l} y={PAD.t} width={innerW} height={innerH} fill={T.bgElev} />
      <rect x={PAD.l} y={PAD.t} width={innerW} height={innerH} fill="url(#grid)" />

      {/* Quadrant tints */}
      <rect x={xMid} y={PAD.t} width={innerW - (xMid - PAD.l)} height={yMid - PAD.t} fill={T.ink} opacity="0.05" />
      <rect x={PAD.l} y={PAD.t} width={xMid - PAD.l} height={yMid - PAD.t} fill={T.red} opacity="0.05" />

      <rect x={PAD.l} y={PAD.t} width={innerW} height={innerH} fill="none" stroke={T.ink} strokeWidth="1" />
      <line x1={xMid} y1={PAD.t} x2={xMid} y2={PAD.t + innerH} stroke={T.ink} strokeWidth="0.5" strokeDasharray="3 3" opacity="0.4" />
      <line x1={PAD.l} y1={yMid} x2={PAD.l + innerW} y2={yMid} stroke={T.ink} strokeWidth="0.5" strokeDasharray="3 3" opacity="0.4" />

      {/* Quadrant corner labels */}
      <text x={PAD.l + 12} y={PAD.t + 22} fontSize="9" letterSpacing="2.5" fill={T.red} fontWeight="700">QUESTION MARKS</text>
      <text x={PAD.l + innerW - 12} y={PAD.t + 22} fontSize="9" letterSpacing="2.5" fill={T.ink} fontWeight="700" textAnchor="end">CORE BETS</text>
      <text x={PAD.l + 12} y={PAD.t + innerH - 12} fontSize="9" letterSpacing="2.5" fill={T.subdued} fontWeight="700">RECONSIDER</text>
      <text x={PAD.l + innerW - 12} y={PAD.t + innerH - 12} fontSize="9" letterSpacing="2.5" fill={T.teal} fontWeight="700" textAnchor="end">STEADY STATE</text>

      {/* Axis labels */}
      <text x={PAD.l + innerW / 2} y={H - 22} fontSize="10" letterSpacing="2.5" fill={T.ink} textAnchor="middle" fontWeight="600">STRATEGIC ALIGNMENT  →</text>
      <text x={20} y={PAD.t + innerH / 2} fontSize="10" letterSpacing="2.5" fill={T.ink} textAnchor="middle" fontWeight="600" transform={`rotate(-90, 20, ${PAD.t + innerH / 2})`}>↑  IMPACT</text>

      {/* Numeric scale ticks (1-5) */}
      {[1, 2, 3, 4, 5].map((n) => (
        <g key={`xt${n}`}>
          <line x1={xS(n)} y1={PAD.t + innerH} x2={xS(n)} y2={PAD.t + innerH + 4} stroke={T.ink} strokeWidth="0.5" />
          <text x={xS(n)} y={H - PAD.b + 18} fontSize="9" fill={T.subdued} textAnchor="middle" fontFamily="var(--f-mono)">{n}</text>
        </g>
      ))}
      {[1, 2, 3, 4, 5].map((n) => (
        <g key={`yt${n}`}>
          <line x1={PAD.l - 4} y1={yS(n)} x2={PAD.l} y2={yS(n)} stroke={T.ink} strokeWidth="0.5" />
          <text x={PAD.l - 8} y={yS(n) + 3} fontSize="9" fill={T.subdued} textAnchor="end" fontFamily="var(--f-mono)">{n}</text>
        </g>
      ))}
      <text x={PAD.l - 8} y={yS(5) - 8} fontSize="9" fill={T.subdued} textAnchor="end" fontStyle="italic">High</text>
      <text x={PAD.l - 8} y={yS(1) + 16} fontSize="9" fill={T.subdued} textAnchor="end" fontStyle="italic">Low</text>
      <text x={xS(1)} y={H - PAD.b + 30} fontSize="9" fill={T.subdued} textAnchor="middle" fontStyle="italic">Low</text>
      <text x={xS(5)} y={H - PAD.b + 30} fontSize="9" fill={T.subdued} textAnchor="middle" fontStyle="italic">High</text>

      {filtered.map((d) => {
        const cx = xS(d.plot_x), cy = yS(d.plot_y);
        const meta = QUAD[d.quadrant];
        const isHov = hovered && hovered.id === d.id;
        const r = 5 + Math.min(d.resource_count, 5) * 0.8;
        return (
          <g key={d.id}>
            <circle cx={cx} cy={cy} r={r + 4} fill={meta.color} opacity={isHov ? 0.18 : 0} style={{ transition: "opacity 0.15s" }} />
            <circle
              cx={cx} cy={cy} r={r}
              fill={d.impact_level === "H" ? meta.color : T.bgElev}
              stroke={meta.color}
              strokeWidth={d.impact_level === "H" ? 0 : 1.5}
              opacity={isHov ? 1 : 0.88}
              style={{ cursor: "pointer", transition: "opacity 0.15s" }}
              onMouseEnter={() => setHovered(d)}
              onMouseLeave={() => setHovered(null)}
              onClick={() => onSelect(d)}
            />
            {d.external && <circle cx={cx + r * 0.7} cy={cy - r * 0.7} r={2} fill={T.amber} pointerEvents="none" />}
          </g>
        );
      })}

      {hovered && (
        <g pointerEvents="none">
          <rect x={Math.min(xS(hovered.plot_x) + 14, W - 280)} y={Math.max(yS(hovered.plot_y) - 44, PAD.t)} width="270" height="78" fill={T.ink} rx="2" />
          <text x={Math.min(xS(hovered.plot_x) + 24, W - 270)} y={Math.max(yS(hovered.plot_y) - 24, PAD.t + 18)} fontSize="11" fill={T.bg} fontWeight="700">{hovered.name}</text>
          <text x={Math.min(xS(hovered.plot_x) + 24, W - 270)} y={Math.max(yS(hovered.plot_y) - 8, PAD.t + 34)} fontSize="9" fill="#a8b8c8" letterSpacing="1.5">
            {hovered.lead.toUpperCase()}  ·  {hovered.quadrant.toUpperCase()}
          </text>
          <text x={Math.min(xS(hovered.plot_x) + 24, W - 270)} y={Math.max(yS(hovered.plot_y) + 8, PAD.t + 50)} fontSize="9" fill="#a8b8c8" fontFamily="var(--f-mono)">
            SA {hovered.sa.toFixed(1)}  ·  IMP {hovered.impact.toFixed(1)}
          </text>
          <text x={Math.min(xS(hovered.plot_x) + 24, W - 270)} y={Math.max(yS(hovered.plot_y) + 24, PAD.t + 66)} fontSize="9" fill="#a8b8c8">Click for full record</text>
        </g>
      )}
    </svg>
  );
}

// ─── TIMELINE ────────────────────────────────────────────────────────
function Timeline({ data, onSelect, groupBy }) {
  const X_START = 2024, X_END = 2029, ROW_H = 24;
  const items = data.filter((d) => d.start && d.finish).map((d) => ({ ...d, _s: dateToFloat(d.start), _f: dateToFloat(d.finish) }));
  let groups = {};
  if (groupBy === "lead") items.forEach((d) => { groups[d.lead] = groups[d.lead] || []; groups[d.lead].push(d); });
  else items.forEach((d) => { groups[d.quadrant] = groups[d.quadrant] || []; groups[d.quadrant].push(d); });
  const groupOrder = groupBy === "lead"
    ? Object.keys(groups).sort()
    : ["Core Bets", "Question Marks", "Steady State", "Reconsider"].filter((g) => groups[g]);
  groupOrder.forEach((g) => groups[g].sort((a, b) => a._s - b._s));

  const HDR_H = 60, GRP_H = 38, GAP = 8;
  let y = HDR_H;
  const rows = [];
  groupOrder.forEach((g) => {
    rows.push({ y, header: g, count: groups[g].length });
    y += GRP_H;
    groups[g].forEach((it) => { rows.push({ y, item: it }); y += ROW_H; });
    y += GAP;
  });
  const totalH = y + 30;

  const PAD_L = 240, PAD_R = 60, W = 1200;
  const innerW = W - PAD_L - PAD_R;
  const xS = (yr) => PAD_L + ((Math.max(X_START, Math.min(X_END, yr)) - X_START) / (X_END - X_START)) * innerW;
  const years = [2024, 2025, 2026, 2027, 2028, 2029];
  const quarters = [];
  for (let yr = X_START; yr < X_END; yr++) for (let q = 1; q <= 4; q++) quarters.push(yr + (q - 1) * 0.25);

  return (
    <div style={{ overflowX: "auto", border: `1px solid ${T.rule}`, background: T.bgElev, borderRadius: 4 }}>
      <svg viewBox={`0 0 ${W} ${totalH}`} style={{ width: "100%", minWidth: 1000, display: "block", fontFamily: "var(--f-sans)" }}>
        {quarters.map((q, i) => <line key={"q" + i} x1={xS(q)} y1={HDR_H} x2={xS(q)} y2={totalH - 30} stroke={T.rule} strokeWidth="0.5" strokeDasharray="2 4" opacity="0.5" />)}
        {years.map((yr) => <line key={"y" + yr} x1={xS(yr)} y1={HDR_H - 8} x2={xS(yr)} y2={totalH - 30} stroke={T.ink} strokeWidth="0.5" opacity="0.3" />)}
        {years.slice(0, -1).map((yr) => (
          <text key={"yl" + yr} x={xS(yr + 0.5)} y={28} fontSize="13" fill={T.ink} textAnchor="middle" fontFamily="var(--f-mono)" fontWeight="600">{yr}</text>
        ))}
        {quarters.filter((q) => q !== Math.floor(q)).map((q, i) => (
          <text key={"ql" + i} x={xS(q + 0.125)} y={48} fontSize="9" fill={T.subdued} textAnchor="middle" letterSpacing="1.5" fontFamily="var(--f-mono)">
            Q{Math.round((q - Math.floor(q)) * 4) + 1}
          </text>
        ))}

        <line x1={xS(TODAY)} y1={HDR_H - 12} x2={xS(TODAY)} y2={totalH - 30} stroke={T.amber} strokeWidth="1.5" />
        <rect x={xS(TODAY) - 26} y={HDR_H - 26} width="52" height="14" fill={T.amber} />
        <text x={xS(TODAY)} y={HDR_H - 16} fontSize="9" fill={T.bg} textAnchor="middle" letterSpacing="2" fontWeight="700">TODAY</text>

        {rows.map((r, i) => {
          if (r.header) {
            const groupColor = groupBy === "quadrant" ? QUAD[r.header].color : T.ink;
            return (
              <g key={"g" + i}>
                <line x1={20} y1={r.y + 22} x2={PAD_L - 12} y2={r.y + 22} stroke={groupColor} strokeWidth="1" />
                <text x={20} y={r.y + 18} fontSize="10" letterSpacing="2.5" fill={groupColor} fontWeight="800">{r.header.toUpperCase()}</text>
                <text x={PAD_L - 8} y={r.y + 18} fontSize="10" fill={T.subdued} textAnchor="end" fontFamily="var(--f-mono)">{r.count} item{r.count !== 1 ? "s" : ""}</text>
              </g>
            );
          }
          const d = r.item;
          const meta = QUAD[d.quadrant];
          const x1 = xS(d._s), x2 = xS(d._f);
          const isOverrun = d._f > X_END;
          const isInFlight = d._s <= TODAY && d._f >= TODAY;
          const isComplete = d._f < TODAY;
          return (
            <g key={"r" + i} style={{ cursor: "pointer" }} onClick={() => onSelect(d)}>
              <rect x={20} y={r.y} width={W - 40} height={ROW_H} fill="transparent"
                onMouseEnter={(e) => e.currentTarget.setAttribute("fill", T.bgGrid)}
                onMouseLeave={(e) => e.currentTarget.setAttribute("fill", "transparent")} />
              <text x={PAD_L - 12} y={r.y + 16} fontSize="11" fill={T.ink} textAnchor="end" fontWeight="500">{d.name}</text>
              <line x1={PAD_L} y1={r.y + 12} x2={W - PAD_R} y2={r.y + 12} stroke={T.rule} strokeWidth="0.5" opacity="0.5" />
              <rect x={x1} y={r.y + 6} width={Math.max(x2 - x1, 4)} height={12} fill={meta.color} opacity={isComplete ? 0.3 : d.impact_level === "H" ? 0.95 : 0.6} rx="1" />
              {isInFlight && <rect x={x1} y={r.y + 6} width={Math.max(xS(TODAY) - x1, 0)} height={12} fill={T.ink} opacity="0.18" rx="1" />}
              {d.external && <circle cx={x1 - 6} cy={r.y + 12} r={2.5} fill={T.amber} />}
              {isOverrun && <polygon points={`${W - PAD_R - 2},${r.y + 6} ${W - PAD_R + 8},${r.y + 12} ${W - PAD_R - 2},${r.y + 18}`} fill={meta.color} opacity="0.7" />}
            </g>
          );
        })}
      </svg>
    </div>
  );
}

// ─── HEATMAP ─────────────────────────────────────────────────────────
function Heatmap({ data }) {
  const leads = [...new Set(data.map((d) => d.lead))].sort();
  const quads = ["Core Bets", "Question Marks", "Steady State", "Reconsider"];
  const matrix = {};
  leads.forEach((l) => (matrix[l] = { "Core Bets": 0, "Question Marks": 0, "Steady State": 0, "Reconsider": 0, total: 0 }));
  data.forEach((d) => {
    if (matrix[d.lead]) {
      matrix[d.lead][d.quadrant] += 1;
      matrix[d.lead].total += 1;
    }
  });
  const max = Math.max(...leads.flatMap((l) => quads.map((q) => matrix[l][q])));

  return (
    <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: "var(--f-sans)", background: T.bgElev, border: `1px solid ${T.rule}`, borderRadius: 4 }}>
      <thead>
        <tr>
          <th style={{ textAlign: "left", padding: "16px", fontSize: 10, letterSpacing: 2, color: T.subdued, fontWeight: 700, borderBottom: `1px solid ${T.rule}` }}>WORKSTREAM</th>
          {quads.map((q) => (
            <th key={q} style={{ textAlign: "center", padding: "16px", fontSize: 10, letterSpacing: 2, color: QUAD[q].color, fontWeight: 700, borderBottom: `1px solid ${T.rule}`, width: 110 }}>
              {q.toUpperCase()}
            </th>
          ))}
          <th style={{ textAlign: "right", padding: "16px", fontSize: 10, letterSpacing: 2, color: T.subdued, fontWeight: 700, borderBottom: `1px solid ${T.rule}` }}>TOTAL</th>
        </tr>
      </thead>
      <tbody>
        {leads.sort((a, b) => matrix[b].total - matrix[a].total).map((l, idx) => (
          <tr key={l} style={{ borderBottom: idx < leads.length - 1 ? `1px solid ${T.rule}` : "none" }}>
            <td style={{ padding: "16px", fontSize: 14, color: T.ink, fontWeight: 600 }}>{l}</td>
            {quads.map((q) => {
              const v = matrix[l][q];
              const intensity = max > 0 ? v / max : 0;
              const bg = QUAD[q].color;
              return (
                <td key={q} style={{ textAlign: "center", padding: "8px" }}>
                  <span style={{
                    display: "inline-block", minWidth: 40, padding: "8px 12px", fontSize: 13,
                    fontFamily: "var(--f-mono)", fontWeight: 600,
                    color: intensity > 0.4 ? T.bg : T.ink,
                    background: v === 0 ? "transparent" : bg,
                    opacity: v === 0 ? 0.25 : 0.4 + intensity * 0.6,
                    borderRadius: 2,
                  }}>{v}</span>
                </td>
              );
            })}
            <td style={{ textAlign: "right", padding: "16px", fontSize: 13, fontFamily: "var(--f-mono)", color: T.ink, fontWeight: 700 }}>{matrix[l].total}</td>
          </tr>
        ))}
      </tbody>
    </table>
  );
}

// ─── DETAIL DRAWER ───────────────────────────────────────────────────
function Drawer({ initiative, onClose }) {
  if (!initiative) return null;
  const meta = QUAD[initiative.quadrant];
  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(10, 31, 51, 0.5)", zIndex: 50, display: "flex", justifyContent: "flex-end", animation: "fadeIn 0.2s ease" }}>
      <div onClick={(e) => e.stopPropagation()} style={{ width: "min(560px, 100%)", height: "100%", background: T.bg, padding: "32px 40px", overflowY: "auto", boxShadow: "-30px 0 60px rgba(0,0,0,0.2)", animation: "slideIn 0.3s ease" }}>

function DR({ label, value, mono, big, flag }) {
  return (
    <div>

    </div>

}

function Block({ label, body }) {
  return (
    <div style={{ marginBottom: 18 }}>
      <div style={{ fontSize: 9, letterSpacing: 2, color: T.subdued, marginBottom: 6, fontWeight: 700 }}>{label}</div>

// ─── KPI CARD ────────────────────────────────────────────────────────
function KPI({ value, label, sub, flag, accent }) {
  return (
    <div style={{
      background: T.bgElev, border: `1px solid ${T.rule}`, borderRadius: 4,
      padding: "20px 22px",
      borderTop: `2px solid ${flag ? T.amber : accent || T.ink}`,

        lineHeight: 1, letterSpacing: "-0.02em",
      }}>{value}</div>
      {sub && <div style={{ fontSize: 11, color: T.subdued, marginTop: 8, fontWeight: 500 }}>{sub}</div>}
    </div>
  );
}

// ─── TIMELINE SUMMARY ────────────────────────────────────────────────
function TimelineSummary({ data }) {
  const items = data.filter((d) => d.start && d.finish);
  const inFlight = items.filter((d) => dateToFloat(d.start) <= TODAY && dateToFloat(d.finish) >= TODAY).length;
  const startingQ = items.filter((d) => dateToFloat(d.start) > TODAY && dateToFloat(d.start) <= TODAY + 0.25).length;
  const finishingQ = items.filter((d) => dateToFloat(d.finish) >= TODAY && dateToFloat(d.finish) <= TODAY + 0.25).length;
  const longRunners = items.filter((d) => d.duration_months && d.duration_months >= 18).length;
  const overdue = items.filter((d) => dateToFloat(d.finish) < TODAY).length;

  const cards = [
    { v: inFlight, l: "IN FLIGHT", s: "Active right now" },
    { v: startingQ, l: "STARTING Q+1", s: "Resourcing decisions due" },
    { v: finishingQ, l: "FINISHING THIS Q", s: "Closure & handover" },
    { v: longRunners, l: "≥ 18 MONTHS", s: "Re-commit at milestones" },
    { v: overdue, l: "PAST FINISH", s: "Status reconciliation", flag: overdue > 0 },
  ];

  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 12, marginBottom: 24 }}>
      {cards.map((c, i) => <KPI key={i} value={c.v} label={c.l} sub={c.s} flag={c.flag} />)}
    </div>
  );
}

          </section>
        )}

        {view === "leads" && (
          <section>
            <div style={{ marginBottom: 24 }}>
              <div style={{ fontSize: 9, letterSpacing: 2, color: T.subdued, fontWeight: 700 }}>WORKLOAD HEATMAP</div>
              <h2 style={{ fontSize: 28, fontWeight: 700, margin: "4px 0 8px", letterSpacing: "-0.02em" }}>Workstreams by Quadrant</h2>
              <p style={{ fontSize: 14, color: T.subdued, maxWidth: 720, lineHeight: 1.5, margin: 0 }}>
                Workload by workstream and quadrant. Heaviest cells show where each lead is leaning hardest.
              </p>
            </div>
            <Heatmap data={matrixData} />
          </section>
        )}

        {view === "list" && (
          <section>
            <div style={{ marginBottom: 24 }}>
              <div style={{ fontSize: 9, letterSpacing: 2, color: T.subdued, fontWeight: 700 }}>FULL REGISTER</div>
              <h2 style={{ fontSize: 28, fontWeight: 700, margin: "4px 0 8px", letterSpacing: "-0.02em" }}>All Initiatives</h2>
              <p style={{ fontSize: 14, color: T.subdued, maxWidth: 720, lineHeight: 1.5, margin: 0 }}>Click any row to open the full record.</p>
            </div>

            <div style={{ background: T.bgElev, border: `1px solid ${T.rule}`, borderRadius: 4, overflow: "hidden" }}>
              <div style={{
                display: "grid",
                gridTemplateColumns: "60px 60px 1fr 180px 120px 120px 100px",
                gap: 16, padding: "14px 20px",
                fontSize: 9, letterSpacing: 2, color: T.subdued, fontWeight: 700,
                borderBottom: `1px solid ${T.rule}`, background: T.bgGrid,
              }}>
                <div>SA</div>
                <div>IMP</div>
                <div>INITIATIVE</div>
                <div>WORKSTREAM</div>
                <div>QUADRANT</div>
                <div>PM</div>
                <div style={{ textAlign: "right" }}>FINISH</div>
              </div>
              {filtered.sort((a, b) => {
                // Sort by quadrant priority, then by impact desc
                const qOrder = { "Core Bets": 0, "Question Marks": 1, "Steady State": 2, "Reconsider": 3 };
                if (qOrder[a.quadrant] !== qOrder[b.quadrant]) return qOrder[a.quadrant] - qOrder[b.quadrant];
                return b.impact - a.impact;
              }).map((d, i) => {
                const meta = QUAD[d.quadrant];
                return (
                  <button key={d.id} onClick={() => setSelected(d)} style={{
                    display: "grid", gridTemplateColumns: "60px 60px 1fr 180px 120px 120px 100px",
                    gap: 16, padding: "14px 20px", background: "transparent", border: "none",
                    borderBottom: i < filtered.length - 1 ? `1px solid ${T.rule}` : "none",
                    textAlign: "left", width: "100%", cursor: "pointer", alignItems: "center",
                    fontFamily: "var(--f-sans)",
                  }}
                  onMouseEnter={(e) => (e.currentTarget.style.background = T.bgGrid)}
                  onMouseLeave={(e) => (e.currentTarget.style.background = "transparent")}>
                    <div style={{ fontFamily: "var(--f-mono)", fontSize: 12, fontWeight: 600, color: d.sa >= 4 ? T.ink : T.subdued }}>{d.sa.toFixed(1)}</div>
                    <div style={{ fontFamily: "var(--f-mono)", fontSize: 12, fontWeight: 600, color: d.impact >= 4 ? T.ink : T.subdued }}>{d.impact.toFixed(1)}</div>
                    <div style={{ fontSize: 14, color: T.ink, fontWeight: 500 }}>{d.name}</div>
                    <div style={{ fontSize: 12, color: T.inkSoft }}>{d.lead}</div>
                    <div style={{ fontSize: 9, letterSpacing: 1.5, color: meta.color, fontWeight: 700 }}>{meta.label.toUpperCase()}</div>
                    <div style={{ fontFamily: "var(--f-mono)", fontSize: 11, color: d.pm_missing ? T.amberDeep : T.inkSoft, fontWeight: d.pm_missing ? 700 : 500 }}>{d.pm}</div>
                    <div style={{ fontFamily: "var(--f-mono)", fontSize: 11, color: T.subdued, textAlign: "right" }}>{d.finish || "—"}</div>
                  </button>
                );
              })}
            </div>
          </section>
        )}
      </main>

      <footer style={{
        background: T.bgElev, borderTop: `1px solid ${T.rule}`,
        padding: "20px 32px",
        display: "flex", justifyContent: "space-between", alignItems: "center",
        fontSize: 11, color: T.subdued,
      }}>
        <div style={{ display: "flex", gap: 24, alignItems: "center" }}>
          <Logo />
          <span style={{ fontFamily: "var(--f-mono)" }}>· Portfolio Diagnostic v1.1 ·</span>
        </div>
        <div style={{ fontFamily: "var(--f-mono)", fontSize: 10, letterSpacing: 1 }}>
          PREPARED Q1 FY27  ·  CONFIDENTIAL
        </div>
      </footer>

      <Drawer initiative={selected} onClose={() => setSelected(null)} />
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

// Hide loader once React has rendered
requestAnimationFrame(() => {
  setTimeout(() => {
    const loader = document.getElementById("loading");
    if (loader) {
      loader.classList.add("hidden");
      setTimeout(() => loader.remove(), 300);
    }
  }, 100);
});
</script>

</body>
</html>
